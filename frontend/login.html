<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Pi Display Manager</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          Cantarell, sans-serif;
        background: linear-gradient(
          135deg,
          #0f172a 0%,
          #1e293b 50%,
          #334155 100%
        );
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
      }

      .login-container {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        padding: 48px;
        width: 100%;
        max-width: 420px;
        animation: slideUp 0.5s ease-out;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .logo {
        text-align: center;
        margin-bottom: 32px;
      }

      .logo-icon {
        font-size: 64px;
        margin-bottom: 16px;
        display: block;
      }

      .logo h1 {
        font-size: 28px;
        color: #2d3748;
        margin-bottom: 8px;
      }

      .logo p {
        color: #718096;
        font-size: 14px;
      }

      .form-group {
        margin-bottom: 24px;
      }

      label {
        display: block;
        color: #4a5568;
        font-weight: 600;
        margin-bottom: 8px;
        font-size: 14px;
      }

      input {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid #e2e8f0;
        border-radius: 8px;
        font-size: 16px;
        transition: all 0.3s;
        background: #f7fafc;
      }

      input:focus {
        outline: none;
        border-color: #667eea;
        background: white;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }

      input::placeholder {
        color: #a0aec0;
      }

      .btn-login {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
        margin-top: 8px;
      }

      .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
      }

      .btn-login:active {
        transform: translateY(0);
      }

      .btn-login:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      .alert {
        padding: 12px 16px;
        border-radius: 8px;
        margin-bottom: 24px;
        font-size: 14px;
        display: none;
        animation: shake 0.5s;
      }

      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-10px);
        }
        75% {
          transform: translateX(10px);
        }
      }

      .alert-error {
        background: #fed7d7;
        color: #c53030;
        border: 1px solid #fc8181;
      }

      .alert-success {
        background: #c6f6d5;
        color: #22543d;
        border: 1px solid #68d391;
      }

      .password-toggle {
        position: relative;
      }

      .password-toggle-btn {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        font-size: 20px;
        padding: 4px;
        color: #718096;
        transition: color 0.3s;
      }

      .password-toggle-btn:hover {
        color: #2d3748;
      }

      .footer {
        text-align: center;
        margin-top: 24px;
        color: #718096;
        font-size: 13px;
      }

      .loading-spinner {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 2px solid #ffffff;
        border-radius: 50%;
        border-top-color: transparent;
        animation: spinner 0.6s linear infinite;
        margin-right: 8px;
      }

      @keyframes spinner {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="logo">
        <span class="logo-icon">🖼️</span>
        <h1>Pi Display Manager</h1>
        <p>Sign in to access your display manager</p>
      </div>

      <div id="alert" class="alert"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Enter your username"
            required
            autocomplete="username"
            autofocus
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-toggle">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              required
              autocomplete="current-password"
            />
            <button
              type="button"
              class="password-toggle-btn"
              id="toggle-password"
              title="Show password"
            >
              👁️
            </button>
          </div>
        </div>

        <button type="submit" class="btn-login" id="login-btn">Sign In</button>
      </form>

      <div class="footer">
        <p>Default credentials: admin / admin123</p>
        <p style="margin-top: 8px; font-size: 12px">
          Change credentials in auth.json
        </p>
      </div>
    </div>

    <script>
      const form = document.getElementById("login-form");
      const alertBox = document.getElementById("alert");
      const loginBtn = document.getElementById("login-btn");
      const togglePasswordBtn = document.getElementById("toggle-password");
      const passwordInput = document.getElementById("password");

      // Password visibility toggle
      togglePasswordBtn.addEventListener("click", () => {
        const type =
          passwordInput.getAttribute("type") === "password"
            ? "text"
            : "password";
        passwordInput.setAttribute("type", type);
        togglePasswordBtn.textContent = type === "password" ? "👁️" : "🙈";
      });

      // Show alert message
      function showAlert(message, type = "error") {
        alertBox.textContent = message;
        alertBox.className = `alert alert-${type}`;
        alertBox.style.display = "block";

        if (type === "success") {
          setTimeout(() => {
            alertBox.style.display = "none";
          }, 2000);
        }
      }

      // Hide alert
      function hideAlert() {
        alertBox.style.display = "none";
      }

      // Handle form submission
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        hideAlert();

        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;

        if (!username || !password) {
          showAlert("Please enter both username and password");
          return;
        }

        // Disable button and show loading
        loginBtn.disabled = true;
        const originalText = loginBtn.innerHTML;
        loginBtn.innerHTML =
          '<span class="loading-spinner"></span>Signing in...';

        try {
          const response = await fetch("/api/auth/login", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ username, password }),
          });

          const data = await response.json();

          if (response.ok && data.status === "success") {
            showAlert("Login successful! Redirecting...", "success");
            setTimeout(() => {
              window.location.href = "/";
            }, 500);
          } else {
            showAlert(data.message || "Login failed. Please try again.");
            loginBtn.disabled = false;
            loginBtn.innerHTML = originalText;
          }
        } catch (error) {
          showAlert("Connection error. Please check if the server is running.");
          loginBtn.disabled = false;
          loginBtn.innerHTML = originalText;
        }
      });

      // Check if already logged in
      (async () => {
        try {
          const response = await fetch("/api/auth/status");
          const data = await response.json();

          if (data.authenticated) {
            window.location.href = "/";
          }
        } catch (error) {
          // Not logged in or error, stay on login page
        }
      })();

      // Enter key on password field
      passwordInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
          form.dispatchEvent(new Event("submit"));
        }
      });
    </script>
  </body>
</html>
