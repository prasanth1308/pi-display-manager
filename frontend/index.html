<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pi Display Manager</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

<!-- ── Header ── -->
<header>
  <h1>🖥 Pi Display</h1>

  <div id="now-playing-bar">
    <span id="now-playing-label">Now Playing:</span>
    <span id="now-playing-name">—</span>
    <span id="status-badge" class="stopped">Stopped</span>
  </div>

  <div class="transport">
    <button id="btn-pause" title="Pause / Resume">⏸</button>
    <button id="btn-stop" title="Stop">⏹</button>
    <button id="btn-next" title="Next">⏭</button>
  </div>
</header>

<!-- ── Tabs ── -->
<nav class="tabs">
  <button class="active" data-tab="tab-files">📁 Files</button>
  <button data-tab="tab-playlists">📋 Playlists</button>
  <button data-tab="tab-schedules">🕐 Schedules</button>
</nav>

<!-- ── Main ── -->
<main>

  <!-- Files Tab -->
  <div id="tab-files" class="tab-panel active">
    <div id="upload-zone">
      <div class="icon">⬆️</div>
      <strong>Click or drag files to upload</strong>
      <p>Supports: JPG, PNG, GIF, BMP, WEBP &nbsp;|&nbsp; MP4, AVI, MKV, MOV, WEBM</p>
      <input type="file" id="file-input" multiple accept=".jpg,.jpeg,.png,.gif,.bmp,.webp,.mp4,.avi,.mkv,.mov,.webm" style="display:none" />
    </div>

    <div id="upload-progress">
      <span id="upload-progress-label" style="font-size:12px;color:var(--muted)"></span>
      <div id="upload-progress-bar"><div id="upload-progress-fill"></div></div>
    </div>

    <div class="section-title">Uploaded Files</div>
    <div id="file-grid"></div>
  </div>

  <!-- Playlists Tab -->
  <div id="tab-playlists" class="tab-panel">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div class="section-title" style="margin:0">Playlists</div>
      <button class="btn btn-primary" onclick="openPlaylistEditor()">+ New Playlist</button>
    </div>

    <!-- Playlist editor (inline) -->
    <div id="playlist-editor">
      <div class="form-row">
        <div class="form-group" style="flex:1">
          <label>Playlist Name</label>
          <input type="text" id="playlist-name-input" placeholder="e.g. Morning News" />
        </div>
        <button class="btn btn-secondary" id="add-to-playlist-btn">+ Add Files</button>
        <button class="btn btn-primary" onclick="savePlaylist()">Save</button>
        <button class="btn btn-secondary" onclick="closePlaylistEditor()">Cancel</button>
      </div>

      <div class="section-title">Items (drag to reorder)</div>
      <div id="playlist-items-list"></div>
    </div>

    <div id="playlist-list"></div>
  </div>

  <!-- Schedules Tab -->
  <div id="tab-schedules" class="tab-panel">
    <div class="card">
      <div class="section-title">New Schedule</div>
      <div class="form-row">
        <div class="form-group">
          <label>Name</label>
          <input type="text" id="schedule-name" placeholder="e.g. Morning Briefing" />
        </div>
        <div class="form-group">
          <label>Playlist</label>
          <select id="schedule-playlist">
            <option value="">— Select playlist —</option>
          </select>
        </div>
        <div class="form-group">
          <label>Cron Expression</label>
          <input type="text" id="schedule-cron" placeholder="0 9 * * *" />
        </div>
        <button class="btn btn-primary" style="align-self:flex-end" onclick="createSchedule()">Create</button>
      </div>

      <div style="margin-top:8px;">
        <span style="font-size:12px;color:var(--muted);margin-right:8px;">Presets:</span>
        <button class="btn btn-sm btn-secondary cron-preset" data-cron="0 9 * * *">9 AM daily</button>
        <button class="btn btn-sm btn-secondary cron-preset" data-cron="0 9 * * 1-5" style="margin-left:6px">Weekdays 9 AM</button>
        <button class="btn btn-sm btn-secondary cron-preset" data-cron="0 9,13,17 * * *" style="margin-left:6px">9 AM / 1 PM / 5 PM</button>
        <button class="btn btn-sm btn-secondary cron-preset" data-cron="*/30 * * * *" style="margin-left:6px">Every 30 min</button>
      </div>

      <div style="margin-top:10px;font-size:12px;color:var(--muted);">
        Format: <code style="background:var(--surface2);padding:2px 6px;border-radius:4px;">minute hour day month weekday</code>
        &nbsp; <a href="https://crontab.guru" target="_blank" style="color:var(--accent)">crontab.guru ↗</a>
      </div>
    </div>

    <div class="section-title">Active Schedules</div>
    <div id="schedule-list"></div>
  </div>

</main>

<!-- ── File Picker Modal ── -->
<div id="file-picker-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;align-items:center;justify-content:center;">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);width:480px;max-width:95vw;max-height:80vh;display:flex;flex-direction:column;">
    <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">
      <strong>Select Files</strong>
      <button id="file-picker-close" style="background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;">✕</button>
    </div>
    <div id="file-picker-list" style="overflow-y:auto;padding:16px;flex:1;"></div>
    <div style="padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;">
      <button class="btn btn-secondary" id="file-picker-close2" onclick="document.getElementById('file-picker-modal').style.display='none'">Cancel</button>
      <button class="btn btn-primary" id="file-picker-confirm">Add Selected</button>
    </div>
  </div>
</div>

<!-- ── Toast ── -->
<div id="toast"></div>

<script src="/static/js/app.js"></script>
</body>
</html>
